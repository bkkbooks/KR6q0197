front:
  text: 浮渡山大華嚴寺中興尊宿朗目禪師塔銘併序賜進士出身翰林院編修參學優婆塞邑人吳應賓撰文賜進士出身翰林院編修龍眼居士邑人何如寵篆書浮山華嚴寺者宋圓鑑大師遠録公為歐陽永叔因碁說法處也其在國朝則古亭和尚以山雲水石作大師子吼去而還滇百年許而朗目禪師復自滇來浮渡稱中興尊宿云師曲靖李氏子也法諱本智初號慧光余同年黃舍人道月以朗目更之曲陽之城有朗目山師之剃髮在焉志初且旌法眼也山之主人曰白齊和尚始出家有于弱而慧龍性難馴白齊窘之北方數年得其傷足之便乃負而趨為之剃染即師也白齊捨富人居修遠離行華嚴法界勤勇念知其住雞足住會城皆以師從聞熏發起良厚將順世有為師請遺教者白齊曰是惡知不旦莫為人壻耶蓋激之也師乃發憤請益諸方是時武當不二伏牛大方印宗南嶽無盡廬山大菴薊門遍融月心性天輩皆倡導師所至有結夏者有三年淹者有發蹤者有安鼻孔者有擩首者有揚眉瞬目者有點頭者有為之停機注思者雖咄咄逼人未嘗自喜清涼峨眉落伽天臺少林蘆芽之屬咸極幽討庶幾遇之其後乃登天目蘭風之門風以見佛了生死為問師方擬說輒呵之一日風肩柴次遙見師擲之於地曰見佛了生死師不言直前肩其柴大呼曰見佛了生死風深契之於是臨濟之金剛王時從面門放光出入稱藂林白眉矣往余讀蘭公所著宗鑑而歎師之能肖其哮吼也而蘭公常以方便攝諸外道賊具借資頗滋不譽波及師愛者請有以自二師曰譬如飲水冷暖自知奈何以外人齒頰而背吾心耶而師所摧伏外道以謝蘭公亦復不少易曰幹父之蠱師之謂也師既具擇法眼以婆心故不辭泥水門人於方之內前後所得當名人魁古無慮數十輩不具載載其慕用之尤者過六安時劉大夫垓為新中峰山居之剎曰華嚴者以憩瓶錫既成去而遊曰不鍾給事字滈陶比部允宜皆莫逆焉居數年比部左遷廬州別駕視篆於六出俸錢創鏡心精舍以待師問行至合肥則黃舍人片言投契上首自雄作朗目禪師小傳而余小子應賓用萬曆甲午從四衆範文六天人師歸於浮山之金谷巖當事之嚴而師飄然一衲挂搭菩提場中悲仰請加者纍月像成然後去既見君子我心則夷同心之言雲興瓶瀉二三冥契皆曰未曾有也蓋自古亭之去浮渡而華嚴燼矣支提覷山和尚從余請以慈聖皇太后法寶駐錫金谷為蘭若前茅明年復如支提久之示寂則遂以金谷戴師始至自六首為遠公舉揚十帶慈濟堪忍衆是以和波旬滋蠢至剖龍宮而馬鬣之師曰真宰豈有異方便耶禱於三洲包腰而去而如來所遣劉司空東星以中丞建節淮濟慈示之不忘急開士邂逅師子龍興睹大機之用而喜可知也靜室用二輩禮館之左舍大索竺墳請所以報德者三而師不應也無已乃言浮渡亟下所司治反金地諸使者郡邑大夫順流更始闡提章章歸我汶陽而會上大轉三藏法輪於菩薩住處師自濟之普照如京師中丞之聲實為前導遂得請一時英碩諸所推挽若臂若舌語具余內凡胡參知瓚所成浮山志中肇自戊戌迄於壬寅首尾五夏而浮山護國大華嚴屹然表於龍象之窟璽書貝㲲特地配天歐遠一會儼然未散惟兩大士尸之怪乃沁水之車浮山之笠千里一日不異合符豈人力也哉所從來久遠矣師氣韻閒曠目無貴高取大宰官惟法幢之是務建食不力珍臥不下帷入為寶瓶出乃香積三藏之函三寶之塔秋毫皆四事之自出也操觚之技慧業夙成林下水邊味其韻語爽然若致身中峰之側書法潛心右軍往往以道徑見賞然皆不竟學取能莊嚴第一義為悉檀之助而已高山仰止麈尾是瞻楮墨齒牙應接不暇或時體為之敝師亦不知也輕重不立於懷讚毀不止於耳二施四攝所起佛種使有籌室何啻闍維余同年竇廉訪子稱喻之淨月處空影涵萬水倔彊者不覺心下所至非有求人人者求之于開府若瀛汪中丞可受陶祭酒望齡袁洗馬宗道黃庶子輝李侍御天麟王職方舜鼎張大參淳皆許絶倫之目而王太史升𧌙太史思霈王給諫元翰朱武部世昌陳觀察佇蔡工部善繼李評事張令尹慎言吳州守澄時阮州守以臨陶進士珽司空之胄子劉並總已北面稱浮山優婆塞者也僧伽藍摩經綸伊始則付囑其徒圓白而脫身為竿木之遊回見業因有力者復祖堂之寧海使白之兄圓教居之至沁水置芻於司空之墓而是時瀋藩以金湯為剎利中最尤好華嚴所居諸座主執經侍側居然五十三參中一數聞師名因其人都致之既至長揖不拜發以敬田神情整暇慈旨清婉瀋邸為之改容肅客法喜滋熏明日遂納師資禮所供獨受一紫伽黎及水晶素珠為浮渡之鎮而瀋邸不復南面朝釋子矣師於紫柏老人後而未往挂錫薊門而紫柏示受王難譸張之徒虎且域招提大恐師以空寂我國晏然作書抵吾家客部用先讚嘆紫柏逆行方便甚難希有由斯以談師之親見紫柏久矣而山陰錢經國所述兩公針芥之語實傳聞於紫柏之門知師者何必在弟子耶居數月受慈聖請自寶塔徒居蘆溝之廣慈精藍大建然師所懷來故在浮渡日夜欲有所會以濟南轅而慈聖將周三百六十甲子衆請以首楞嚴法增上祝延師躊躇數四若將弗克至同分別業二種妄見忽下座告大衆曰緣盡矣以水灌掌跏趺而逝時乙巳之十二月二十四日也距生乙卯歷五十暮而符其月日僧臘以十計者四焉訃聞慈聖震悼憫恤有加賜金返靈骨塔於浮渡妙高峰之南麓從師志也師嘗問蘭公和尚知是般事便休何自苦蘭公云恁麼則法有住處矣師伏膺之五載修般舟行以刳正性而違現業入草驀鼻念佛自呼終其身脅罕至席金谷安居率衆長跽以華嚴音聲漩澓觀察而方山之論觸目會心自是更喜修多羅藏蘭風一句不復作奇特想矣師十二驅烏十九行腳三十年一聞家耗還書慰喻諸法空幻外了不及私嘗為余言今是昨非相觀末後脫灑有以也百身可贖絶塵而奔以追六千比丘之鞭影即彌勒樓閣彈指立登何論梵剎哉初後住處皆曰華嚴最初所事師最後所囑大弟子皆華嚴善知識而余讀古亭碑亦以法界之門與離文字印為鳥之二翼往師在滇時嘗熟睹古亭肉身於歸化寺而記名字於浮渡者誤以亭為藤後在王舍滇人向以山雲水石集而後知歸化肉身之為浮渡主也二剎相去萬里百餘年間去來如連環憶忘如蕉鹿可不謂大異乎當師護藏返錫余贈之詩曰古亭歸路為來路遠録宗乘入教乘蓋實録也幻因幻果谷響泉聲十帶十玄搬柴運水未知見佛了生死者到此還有末後句也無嗣師法者圓忍圓教兩座主後先戮力咸有庸施而白書記代師領衆者五年深入緣起得菩薩戒於古心和尚在羯摩中說法第一其末以浮渡推紫柏之高足鎧君子謂之善繼善因此三比丘與師少所偕行腳圓性座主相繼觀化皆以闍維之燼從師於窣堵坡之左側忍之徒佛觀佛香教之從佛開白之徒佛志佛來若守若從不為無樹而開與來也親祝髮於師手嚴淨毗尼勤求般若師之慧命在焉汪中丞嘗與師言於金臺之下師號朗目何不朗吳太史目師笑曰遠公黑白未分一著子非渠無眼人不能覷也余小子未之敢承然師之所以朗余目者亦已多矣天刑未寬無能為役中心藏之何日忘之乃因舍人小傳益托甲午以後所聞見於師者勒之於塔而系以銘銘曰臨濟之宗遠録橫吞曹洞浮山之帶古亭混入華嚴人境俱奪兮龜毛兔角之薪盡事理妙協兮山雲水石之火傳天目之返擲兮顯法身向上之用歸化之出定兮了昔人猶在之緣支茆建剎兮看殘碁於局外微塵經卷兮聽撾鼓於聲前開示衆生兮從來一十九路莊嚴佛土兮向後百千萬年有塔涌地有舌彌天帝網重重而無盡金輪剎剎以俱圓其斯以為朗公之禪夢禪語王舜鼎會稽人兵部侍郎乙巳臘月念有四日午時朗目和尚無疾坐化次日其孫幻際來報越數日將歸靈骨建塔原住浮山問銘於豫豫惟和尚生平夢見這著十方三界既已空卻今日何須更從空裏重牽葛藤夢中說夢意欲借筆端點出光明且莫匆匆草草無已姑取舊時相見一二夢語舉似明眼人共圓此夢何如記壬寅年偕陶石簣趙石梁諸老訪師于寶塔寺石簣舉楞嚴經中喪本受輪語問如何是本和尚不答復問和尚應云若再問便喪卻了也復云必欲究竟此事尚須細詳期以異日衆遂別顧余心動不能已尋與左心源約再訪盤桓竟日頗悉和尚行腳事與提策學人語剖出心肝努破睛珠入泥入水曲為學人嘗云吾嚮於宗門見些光景自謂妥當一機一境當甚麼事汝等學者須著實用力時時覺照始有少分相應又云金剛經須細讀降伏其心只在無我人衆生壽者四相後云應如是知如是見如是信解不生法相學者直須恁麼始得舋舋開示可謂至拳切矣嗣後和尚以送藏歸浮山余以使事歸會稽年餘不相會比甲辰抵京復晤寶塔寺再與石簣諸丈會談慈慧寺石簣細叩此事和尚再四徵詰舉心經照見五蘊皆空語問今見有五蘊如何能空經中說深般若此般若人人本有只是不顯顯即五蘊空矣儘力提示大約欲學人照破幻相透出本地風光耳慈悲心切不無落草之談要以空諸所有一切皆是一切無著此等境界和尚蓋親受用久矣寥寥末法衲子幾人豫與和尚形跡似疏道味頗契豫嘗寄柬以不相見而見和尚答云汝既如是吾亦如是化之先數日和尚以一緣事相託豫答柬尾有云歲將暮矣滴水滴凍目下如何意以相最不謂逾日遂辭世去也目下消息略通一線身世何有去來翛然和尚庶幾得自在法門矣聞先一夕夢四大皆空早起語人生死事亦只尋常吾今覺無身一般然猶升座講楞嚴至別業同分二妄見處罷講歸禪室端坐瞑目而化道俗見聞歎未曾有茶毗日丘太史王給諫至蘆溝橋北皆長跪合爪誦佛至火滅乃已總之同分妄見本無生死妄見生死現在生死妄見無生死種種臆想種種戲論皆夢也打破此夢仍夢也即今有不夢者麼試扶起朗目和尚與伊摸卻眼睛點出光明看
