body:
  text: 妙峰山後學周理輯滇南學人陶珙閱浮山九帶序咄這老漢遭葉縣省雷鳴雨棓忍得氣充寰宇受太陽玄皮履直裰付諸方不直半錢那堪坐大宋仁宗皇祐敕賜浮山大華嚴令四海仰如星斗至今聲價彌天指點文忠子黑白未分前一著畢竟落在那邊敘宗門九帶葛藤猶存一帶未完累天下學人紛紛把作話頭參余是祖師第二十四代覺胤越一萬八千程來究當時未了底公案不免替祖師代轉法輪為諸人聊通一線使楊廣山頭異草翻茂會聖巖前怪石開蓮闢開大通洞口拈出九帶枯禪蓋天蓋地彌古彌今普現諸人面前用之則任汝敲風打雨不用則從他墮海堆山諸人到此還見吾祖師第十帶宗旨麼將拂子向空中一點便下座柬劉晉川司空古人以學道譬之牧牛發心修道如尋牛久之見性如獲牛以念佛總攝六根如調牛故經云譬如牧牛之人執杖視之又云一回入草去把鼻拽將來此捷徑法門老檀早深入矣經云見性易學道難既得見性放過即不可幸老檀二六時中將本參話頭重加精進一切處不可放過念茲在茲如煉精金轉加明淨今時學道之人只務說禪說時似悟對境都迷只為不肯信心一切處放過被境所轉不能轉物為道山僧在長安市上與諸宰官居士單提淨土一門同修念佛三昧如黃太史慎軒居士夫人去世發願永斷愛欲獨處靜室公務之暇一心念佛迴向西方袁又損昆季及一門眷屬俱持彌陀佛號并往生神咒為西方公據又劉尚寶李御史諸上善友俱以念佛三昧送日月此諸法友禪土雙修福慧兩嚴真可謂在家菩薩也今以化諸君念佛公案一百八句見性成佛祕旨書寄老檀熟參熟念自覺覺他但念佛有二種一口頭念報身佛二心頭念法身佛未見性人念口頭佛已見性人念心頭佛以心融十方故念佛一聲十方震動經云佛身充滿於法界正念佛時佛即是心正念心時心即是佛心佛不二法界如如經云覺遍十方界即得成佛道惟老檀深心念佛不盡柬黃慎軒太史貧道智聞居士依最上乘發菩提心久如浮山華嚴遠祖道場乃居士菩提心中一微塵耳此箇微塵量等千界無量凡聖盡處其中智今舉此一塵請居士以筆端三昧點破成華藏莊嚴則十方諸佛無不讚嘆一切眾生無不歡喜智望居士座瞻仰無量答蘊璞法師牛首別而不別龍舒逢而不逢且道不逢不別是何面目咄釋迦以這箇指天指地達摩以這箇分皮分髓臨濟喚作金剛王趙州溷指為柏樹子乃至千七百老衲顛拈倒用俱出不得這箇門頭戶底都為他不逢不別動用百草頭邊寂滅一微塵裏令盡大地人推不倒扶不起上座到此田地只得將空合空以水投水不免以這個陞馬大師千百年爛不盡的一張木床以這箇說老瞿曇五十年譚不了的半邊圓覺以這個剖佛祖心胸以這箇揭人天眼目究竟這個早是空中釘橛那堪更將埋塵故磚封作臘月扇子吐曼浮渡山人說是鹽官犀角卻被巖前石女看破了也呵呵似這等用不著的閒家具只好分付無乎童子等到驢年打死東海鯉魚了一二場懡㦬揀點將來金剛王柏樹子與塵磚臘扇總是古今通弊好與一齊按下放過三十棒且看無面目老子與太虛空商量昨夜把須彌山一摑驚動南海波斯捉住西天賊盜等到今朝日午打三更叫森羅萬象一齊看卻是東村王大老咦然雖如是似這等說話底只合提到十字街頭倩無舌人痛與一場惡罵何故怪他前來錯說了這個開心法語震旦瀋邦有大世主繼成離欲居士早受靈山之記夙植般若之根以悲願無盡故示誕王宮為覺悟自他故迴向佛道以實相觀身以如幻涉世神定三摩志趣六度美聲遐布善信咸依方外朗目比丘者以生死故離世間網遍求善友故歷半天下聞世主道聲欲會心要從浮渡山三十六巖方丈中出經行過百由旬地入舍衛城於十字街頭悲宮智殿中見其世主坐無畏座福德具足智慧洪深以無我智修一切善法知一切法皆是佛法清淨光明如人中月敬合掌問訊曰善哉世主富有國土貴無等倫作何勝因感斯妙果爾時世主即從座起亦合掌問訊答曰我昔曾於無量百千萬億佛所種諸善根深信般若以是善因成是善果又問諸婬怒癡與戒定慧世出世法我及我所得性相平等否曰法與非法悉無自性無性之性性自平等無有差別又問此無性之性境界云何曰虛空佛性境界甚深須藉開示乃得悟入作是語已即迎比丘入大慈悲殿焚五分香禮三世佛問訊比丘曰惟善知識開我智眼入佛知見於是比丘以無聲文名句之智說一切聲文名句之法令世主善友發增上善根之心發深信自信成佛無疑之心發誓與諸佛同堅固實相不二之心發廣大如虛空含萬象之心發隨順世行導利眾生之心發精進不退轉如金剛不壞之心發是心已以普光明智印普印十方三世萬有一切諸法同一光明智體正恁麼時十方諸佛同時現身天下舌頭一齊坐斷比丘默然良久乃謂世主曰此無相法門佛之知見汝今見麼世主亦默然良久曰已見曰若向這裏見得親切轉過身來便與十方諸佛共一脣牙百億修羅同一鼻孔如或未然須向百尺竿頭更進一步如華嚴會上大勢德王勝德王善光無厭諸大聖王皆勤觀察無相之法不著世間自在王位惟求諸佛自在法王之位莫不皆以寂靜之法而為宮殿恒住其中今者大王戒稟菩薩名稱圓性欲泛如來大寂滅海當踐其古聖所履之道將此無相無盡無實無虛無依無住大方廣堅密法界之性作一句話頭一念現前則一念智周法界念念現前則念念智周法界經行坐臥常住其中此是修無修修念無念念行無行行證無證證大王應如是知如是見如是見如是信解行證吾今為汝保任此事終不虛也謹按是篇尊藏瀋瀋策府辛亥秋孟親授無說律師過百由旬轉付剞劂續于初卷之末圓滿浮渡黑白著前十帶公案等攝眾生入大華嚴平等法會盡未來際熾然無間無說即微密瀋瀋所贈號也於是廣淪吳應賓執筆敬紀其事以垂永永七言古贈覺凡關主孤峰頂上結茆關關中深隱無為客三寸面皮冷如冰一點禪心堅似鐵搜空曠劫本來心戰退目前生死賊經行坐臥體如如見聞知覺無分隔千般知解盡拈除一念萬年無間歇猶如鑽木火熾然只待灰飛與煙滅木人持缽下崆峒石女懷胎絕言說兩度相逢話葛藤喃喃未盡婆心切關中有主主中關寂照兩忘虛默默丈夫志氣等金剛摧碎魔王心膽裂萬象光中獨露身非俗非僧非行業松風流水絕音聲青山白雲無顏色逼得虛空粉碎時忽然迸出寥天月三關九帶了無干百非四句無交涉單單拈箇死貓頭臭氣潑天俱漏泄轉身復我一粗拳謂云朗漢多饒舌五言律秋日坐白雲巖方丈為吳篤之明之兩居士譚楞嚴實相每禪餘經行峰頂趺坐巖龕吟風嘯月偶成偈語遂筆以贈之凡八首結社傍禪棲長松覆石溪一心秪這是萬法本來齊得旨空身世忘機出悟迷目前親指示煩惱即菩提其二欲識圓通旨先須了性空道超言象外心應色塵中鳥語談真諦溪聲演妙宗返聞聞自性更莫問西東其三稱性開玄旨隨機闡密因了心忘我相觀世轉空輪獨照融三諦和光泯六塵圓通無內外法界現全身其四經行烏石頂長嘯白雲端夜月山光淨秋空斗宿寒談心揮麈柄問偈坐蒲團點破金剛眼乾坤掌上看其五青華方丈坐與世自相分燈挂巖前月衣沾石上雲寒崖翻豹霧古木篆蟲文更上孤峰頂超然思不群其六古洞開青嶂丹崖挂碧蘿澗中流水細峰頂白雲多僧坐深巖定樵歸野路歌幾多西祖意寂寞在山阿其七這箇摩尼寶塵塵盡放光希聲誰解聽遍界不曾藏返復無歸落來回不定方未離些子地隨處見空王其八今證圓通境長林入曉風普門何滯礙萬法本參同月色波紋裏山光樹影中圓通不是境識境即圓通坐木蓮閣小閣千巖下幽栖一病禪燈懸天上月茶煮谷中泉石潤巖飛瀑林昏樹吐煙有人來問法惟指木開蓮送僧歸雞足孤身遊萬里一錫振千峰踏遍曹溪旨參窮少室宗心花開片片慧日現重重禮罷諸方後歸家扣石鍾七言律登雙峰短策輕衣信步登扳蘿直上最高層千重雲裏三間屋萬丈崖前一箇僧片石孤峰為法座疏星皓月是明燈洞中天地忘今古到此方知最上乘鏡心講堂贈瑞光座主雨花金地湧青蓮勝會靈山尚儼然萬法森羅三昧印一心清淨六根禪劫前寶塔憑誰供空外燈明只自然無垢一生須作佛莫將遠計賺人天浮山解制千日禪關解制時秋風吹動紫伽黎白雲片片橫金谷流水潺潺下石溪錫杖竟飛天柱北缽囊爭出石門西因緣聚散由他去獨向寒山樹影棲呈焦弱侯太史坐到虛空粉碎時此生心地自平夷撥開智眼元無智打破疑團更不疑見離見時名實見知無知處是良知君今剔起眉毛看大地山河更有誰答三龍居士挂月擔風淮海過偶逢知己道情多人貪愛染投塵網爾解心空出世波竹苑共談黃葉偈松間聊賦紫芝歌個中悟得真消息成聖成凡總是他其一急向生前識本真唯心淨土沒關津聲聲不昧元初體念念單明淨法身心外莫尋成道處目前薦取自家珍諦觀蓮國如來子盡是娑婆念佛人其二百歲春秋一剎那從心所欲念彌陀塵勞門裏光陰少般若堂中利益多萬法泯時珠自照六根清處鏡重磨君今悟入如來藏不必辭家隱薜蘿七言絕春望黃鸝學語送春歸爛熳花光到眼時物物更無心外法箇中能有幾人知感懷二首千里路行千里馬一重山隱一重人都然迷卻從前底日夜紛紛泥六塵其二世事紛紛日日新利名誰肯出紅塵人人都有休休意真個休休有幾人雪後括地風輪輥雪毬禪關無火冷颼颼困來就榻和衣倒日出三竿未豁眸夜坐花落銀床春爛熳月沉斗帳夜迢遙虛堂寂寞無人共只把旃檀任意燒齊物心到平時物我齊等閒行處自相宜但教法性無差別不問興慈與任威送僧歸南泉山得意歸山意了然此生端不媿前賢看他古佛南泉老不下空山三十年幽棲幽棲泉石暢心懷鳥自啼兮花自開看見山河國土性眼前何物不如來
